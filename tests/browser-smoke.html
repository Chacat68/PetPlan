<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PetPlan 浏览器冒烟测试</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background: #111827;
        color: #e5e7eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        background:
          radial-gradient(circle at top right, #1e3a5f 0, transparent 38%),
          #111827;
      }

      main {
        width: min(1120px, 100%);
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-family: system-ui, sans-serif;
        font-size: clamp(24px, 4vw, 38px);
      }

      .description {
        margin: 0 0 20px;
        color: #9ca3af;
        line-height: 1.6;
      }

      .summary,
      .results,
      .frame-shell {
        border: 1px solid #374151;
        border-radius: 12px;
        background: rgb(17 24 39 / 82%);
        box-shadow: 0 18px 50px rgb(0 0 0 / 24%);
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 24px;
        align-items: center;
        padding: 14px 18px;
      }

      #status {
        font-weight: 700;
        color: #fbbf24;
      }

      #status.passed {
        color: #34d399;
      }

      #status.failed {
        color: #f87171;
      }

      #counts {
        color: #9ca3af;
      }

      .results {
        margin: 16px 0;
        padding: 0;
        overflow: hidden;
        list-style: none;
      }

      .results:empty::before {
        display: block;
        padding: 16px 18px;
        color: #9ca3af;
        content: "等待测试开始…";
      }

      .result {
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr);
        gap: 10px;
        padding: 13px 18px;
        border-bottom: 1px solid #273244;
      }

      .result:last-child {
        border-bottom: 0;
      }

      .result.pass .icon {
        color: #34d399;
      }

      .result.fail .icon {
        color: #f87171;
      }

      .result strong {
        display: block;
        font-family: system-ui, sans-serif;
      }

      .detail {
        display: block;
        margin-top: 4px;
        color: #9ca3af;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .frame-shell {
        min-height: 360px;
        padding: 10px;
      }

      #frame-host {
        min-height: 340px;
      }

      #frame-host:empty {
        display: grid;
        place-items: center;
        color: #6b7280;
      }

      #frame-host:empty::before {
        content: "测试完成后，游戏 iframe 会自动移除";
      }

      iframe {
        display: block;
        width: 100%;
        height: min(68vw, 630px);
        min-height: 340px;
        border: 0;
        border-radius: 8px;
        background: #020617;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PetPlan 浏览器冒烟测试</h1>
      <p class="description">
        自动验证第二阶段控制器接线、弹窗与分类交互、命运桌成长、远征搜打撤、
        领地建造及 F5 存档恢复。测试会临时隔离并在结束时恢复当前来源下的
        PetPlan 存档。
      </p>

      <section class="summary" aria-live="polite">
        <span id="status">运行中…</span>
        <span id="counts">通过 0 · 失败 0</span>
      </section>

      <ol class="results" id="results" aria-label="测试结果"></ol>

      <section class="frame-shell" aria-label="被测游戏">
        <div id="frame-host"></div>
      </section>
    </main>

    <script>
      (() => {
        "use strict";

        const result = {
          status: "running",
          done: false,
          ok: false,
          startedAt: new Date().toISOString(),
          finishedAt: null,
          error: null,
          counts: { passed: 0, failed: 0, total: 0 },
          checks: [],
        };
        window.__PETPLAN_BROWSER_SMOKE__ = result;

        const statusEl = document.getElementById("status");
        const countsEl = document.getElementById("counts");
        const resultsEl = document.getElementById("results");
        const frameHost = document.getElementById("frame-host");
        const storageSnapshot = new Map();
        let snapshotReady = false;
        let cleanupDone = false;
        let frame = null;

        function getPetPlanStorageKeys() {
          const keys = [];
          for (let index = 0; index < localStorage.length; index += 1) {
            const key = localStorage.key(index);
            if (key && key.startsWith("petplan_")) keys.push(key);
          }
          return keys.sort();
        }

        function refreshSummary() {
          result.counts.passed = result.checks.filter(
            (check) => check.status === "pass",
          ).length;
          result.counts.failed = result.checks.filter(
            (check) => check.status === "fail",
          ).length;
          result.counts.total = result.checks.length;
          countsEl.textContent = `通过 ${result.counts.passed} · 失败 ${result.counts.failed}`;
        }

        function record(status, name, detail = "") {
          const check = { status, name, detail: String(detail || "") };
          result.checks.push(check);

          const item = document.createElement("li");
          item.className = `result ${status}`;

          const icon = document.createElement("span");
          icon.className = "icon";
          icon.setAttribute("aria-hidden", "true");
          icon.textContent = status === "pass" ? "✓" : "✕";

          const content = document.createElement("span");
          const title = document.createElement("strong");
          title.textContent = name;
          content.appendChild(title);

          if (check.detail) {
            const detailEl = document.createElement("span");
            detailEl.className = "detail";
            detailEl.textContent = check.detail;
            content.appendChild(detailEl);
          }

          item.append(icon, content);
          resultsEl.appendChild(item);
          refreshSummary();
          return check;
        }

        function assert(condition, message) {
          if (!condition) throw new Error(message);
        }

        async function step(name, callback) {
          try {
            const detail = await callback();
            record("pass", name, detail);
            return detail;
          } catch (error) {
            record("fail", name, error?.message || error);
            throw error;
          }
        }

        function waitFor(predicate, label, timeout = 20000) {
          const startedAt = performance.now();
          let lastError = null;

          return new Promise((resolve, reject) => {
            const poll = () => {
              try {
                const value = predicate();
                if (value) {
                  resolve(value);
                  return;
                }
              } catch (error) {
                lastError = error;
              }

              if (performance.now() - startedAt >= timeout) {
                const suffix = lastError
                  ? `；最后错误：${lastError.message || lastError}`
                  : "";
                reject(new Error(`等待${label}超时（${timeout}ms）${suffix}`));
                return;
              }

              window.setTimeout(poll, 50);
            };

            poll();
          });
        }

        function parseSlotOneSave() {
          const serialized = localStorage.getItem("petplan_save_1");
          if (!serialized) return null;
          try {
            return JSON.parse(serialized);
          } catch (error) {
            throw new Error(`槽位 1 不是有效 JSON：${error.message}`);
          }
        }

        function snapshotMatchesStorage() {
          const currentKeys = getPetPlanStorageKeys();
          if (currentKeys.length !== storageSnapshot.size) return false;
          return currentKeys.every(
            (key) => localStorage.getItem(key) === storageSnapshot.get(key),
          );
        }

        function cleanup() {
          if (cleanupDone) return;

          if (frame?.isConnected) frame.remove();
          frame = null;

          if (snapshotReady) {
            getPetPlanStorageKeys().forEach((key) => localStorage.removeItem(key));
            storageSnapshot.forEach((value, key) => {
              localStorage.setItem(key, value);
            });
          }

          cleanupDone = true;
        }

        window.addEventListener("pagehide", cleanup, { once: true });

        async function run() {
          let savedFate = null;
          let savedScene = null;
          let savedBuilding = null;

          try {
            await step("隔离现有 PetPlan 存档", () => {
              getPetPlanStorageKeys().forEach((key) => {
                storageSnapshot.set(key, localStorage.getItem(key));
              });
              snapshotReady = true;
              getPetPlanStorageKeys().forEach((key) => localStorage.removeItem(key));
              assert(
                getPetPlanStorageKeys().length === 0,
                "未能清空测试所需的 PetPlan localStorage 键",
              );
              return `已快照 ${storageSnapshot.size} 个 petplan_* 键`;
            });

            await step("同源 iframe 加载并初始化游戏", async () => {
              frame = document.createElement("iframe");
              frame.title = "PetPlan 被测游戏";
              frame.src = "../index.html?browser-smoke=territory-hint-cleanup-20260715a";
              frameHost.appendChild(frame);

              const game = await waitFor(
                () => frame.contentWindow?.game?.isInitialized && frame.contentWindow.game,
                "window.game.isInitialized",
              );
              await waitFor(
                () => frame.contentDocument?.querySelector(".fate-table-coin"),
                "桌面硬币渲染",
              );

              assert(
                frame.contentWindow.location.origin === window.location.origin,
                "iframe 不是同源页面",
              );
              assert(game.currentScene === "fate", "新存档未从命运场景启动");
              return `${frame.contentWindow.location.pathname} · scene=${game.currentScene}`;
            });

            await step("横竖屏限制已关闭且游戏保持可见可操作", () => {
              const doc = frame.contentDocument;
              const gameContainer = doc.querySelector(".game-container");
              const style = frame.contentWindow.getComputedStyle(gameContainer);

              assert(!doc.querySelector(".orientation-lock"), "页面仍存在横屏限制遮罩");
              assert(style.visibility !== "hidden", "游戏容器仍被方向样式隐藏");
              assert(style.pointerEvents !== "none", "游戏容器仍被方向样式禁用交互");
              return `visibility=${style.visibility} · pointer-events=${style.pointerEvents}`;
            });

            await step("命运桌不显示累计次数和银色点击快捷提示", () => {
              const doc = frame.contentDocument;
              assert(!doc.getElementById("fate-total-flips-display"), "累计次数仍显示在桌面顶部");
              assert(!doc.getElementById("fate-skill-tree-btn"), "银色点击快捷提示仍显示在桌面底部");
              return "顶部累计次数与底部快捷提示均已移除";
            });

            await step("下一目标默认紧凑并可按需展开详情", () => {
              const doc = frame.contentDocument;
              const panel = doc.getElementById("fate-next-goal");
              const toggle = doc.getElementById("fate-next-goal-toggle");
              const details = doc.getElementById("fate-next-goal-more");
              assert(panel && toggle && details, "目标 HUD 缺少紧凑详情结构");

              const compactHeight = panel.getBoundingClientRect().height;
              assert(compactHeight <= 56, `目标 HUD 默认高度过大：${compactHeight}px`);
              assert(details.hidden, "目标详情默认没有收起");
              assert(toggle.getAttribute("aria-expanded") === "false", "目标详情初始状态错误");

              toggle.click();
              const expandedHeight = panel.getBoundingClientRect().height;
              assert(!details.hidden, "点击后目标详情没有展开");
              assert(toggle.getAttribute("aria-expanded") === "true", "展开按钮状态没有同步");
              assert(expandedHeight > compactHeight, "展开详情后面板高度没有变化");

              toggle.click();
              assert(details.hidden, "再次点击后目标详情没有收起");
              return `${Math.round(compactHeight)}px → ${Math.round(expandedHeight)}px → 收起`;
            });

            await step("角色与宠物 12 帧序列在浏览器中完成加载", async () => {
              const game = frame.contentWindow.game;
              const frameSize = 256;
              const sheetWidth = frameSize * 12;
              const heroSheet = await waitFor(() => {
                const sprite = game.playerSystem.playerSprites.move;
                return sprite?.image?.naturalWidth === sheetWidth ? sprite : null;
              }, "角色 12 帧序列加载");
              const idleSheet = await waitFor(() => {
                const sprite = game.playerSystem.playerSprites.idle;
                return sprite?.image?.naturalWidth === sheetWidth ? sprite : null;
              }, "角色待机序列加载");
              const petSheet = await waitFor(() => {
                const sheet = game.petSystem.petAnimationSheets?.[1]?.idle;
                return sheet?.naturalWidth === sheetWidth ? sheet : null;
              }, "宠物 12 帧序列加载");
              const monsterSheet = await waitFor(() => {
                const sheet = game.combatSystem.monsterAnimationSheets?.slime?.idle;
                return sheet?.naturalWidth === sheetWidth ? sheet : null;
              }, "怪物 12 帧序列加载");

              assert(heroSheet.frameCount === 12, "角色帧数协议不是 12");
              assert(idleSheet.frameDuration === 96, "角色待机动画速度异常");
              assert(game.petSystem.spriteFrameCount === 12, "宠物帧数协议不是 12");
              assert(game.combatSystem.monsterSpriteFrameCount === 12, "怪物帧数协议不是 12");
              assert(heroSheet.image.naturalHeight === frameSize, "角色单帧高度异常");
              assert(
                heroSheet.image.src.includes("stable-actions-20260721c"),
                `角色移动序列仍在使用旧缓存版本：${heroSheet.image.src}`,
              );
              assert(petSheet.naturalHeight === frameSize, "宠物单帧高度异常");
              assert(monsterSheet.naturalHeight === frameSize, "怪物单帧高度异常");

              const sample = frame.contentDocument.createElement("canvas");
              sample.width = frameSize;
              sample.height = frameSize;
              const sampleContext = sample.getContext("2d", { willReadFrequently: true });
              const footCenters = [];
              for (let index = 0; index < idleSheet.frameCount; index += 1) {
                sampleContext.clearRect(0, 0, frameSize, frameSize);
                sampleContext.drawImage(
                  idleSheet.image,
                  index * frameSize,
                  0,
                  frameSize,
                  frameSize,
                  0,
                  0,
                  frameSize,
                  frameSize,
                );
                const bandTop = Math.floor(frameSize * 0.74);
                const pixels = sampleContext.getImageData(0, bandTop, frameSize, frameSize - bandTop).data;
                let minX = frameSize;
                let maxX = -1;
                for (let pixel = 0; pixel < pixels.length; pixel += 4) {
                  if (pixels[pixel + 3] === 0) continue;
                  const x = (pixel / 4) % frameSize;
                  minX = Math.min(minX, x);
                  maxX = Math.max(maxX, x);
                }
                assert(maxX >= minX, `角色待机第 ${index + 1} 帧没有脚部像素`);
                footCenters.push((minX + maxX + 1) / 2);
              }
              const footSpread = Math.max(...footCenters) - Math.min(...footCenters);
              assert(footSpread <= 1, `角色待机落脚点仍有 ${footSpread}px 漂移`);
              return `hero move=3072x256 / 12 · idle foot spread=${footSpread}px · fire_dog/slime=3072x256 / 12 · cache=stable-actions-20260721c`;
            });

            await step("第二阶段的 8 个控制器均已接线", () => {
              const game = frame.contentWindow.game;
              const controllerNames = [
                "achievementController",
                "battleSceneController",
                "fateSceneController",
                "petModalController",
                "playerModalController",
                "settingsController",
                "shopRecommendationController",
                "territorySceneController",
              ];
              const missing = controllerNames.filter(
                (name) => !game[name] || typeof game[name] !== "object",
              );

              assert(
                missing.length === 0,
                `缺少控制器：${missing.join("、")}`,
              );
              const progressionContext = game.getProgressionContext();
              assert(
                Object.prototype.hasOwnProperty.call(
                  progressionContext,
                  "bestExtractedDepth",
                ),
                "成长上下文缺少成功撤离深度",
              );
              assert(
                Object.prototype.hasOwnProperty.call(
                  progressionContext,
                  "expeditionDepth",
                ),
                "成长上下文缺少当前探索深度",
              );
              return controllerNames.join(" · ");
            });

            await step("当前版本不再挂载成长引导入口或控制器", () => {
              const doc = frame.contentDocument;
              const game = frame.contentWindow.game;
              assert(!doc.getElementById("onboarding-layer"), "成长引导浮层仍在页面中");
              assert(!doc.getElementById("onboarding-replay-btn"), "成长引导入口仍在 HUD 中");
              assert(!game.onboardingController, "成长引导控制器仍在运行时挂载");
              return "entry=none · layer=none · controller=none";
            });

            await step("玩家按钮可打开并关闭玩家弹窗", async () => {
              const doc = frame.contentDocument;
              const trigger = doc.getElementById("game-player-btn");
              const overlay = doc.getElementById("player-modal-overlay");
              assert(trigger && overlay, "未找到玩家按钮或玩家弹窗");

              trigger.click();
              await waitFor(
                () => overlay.classList.contains("active"),
                "玩家弹窗打开",
              );
              assert(
                overlay.querySelector('[role="dialog"]'),
                "玩家弹窗缺少 dialog 容器",
              );

              const closeButton = doc.getElementById("player-modal-close");
              assert(closeButton, "未找到玩家弹窗关闭按钮");
              closeButton.click();
              await waitFor(
                () => !overlay.classList.contains("active"),
                "玩家弹窗关闭",
              );
              return "#game-player-btn → #player-modal-overlay → #player-modal-close";
            });

            await step("设置按钮可打开并关闭设置弹窗", async () => {
              const doc = frame.contentDocument;
              const trigger = doc.getElementById("game-settings-btn");
              const overlay = doc.getElementById("settings-modal-overlay");
              assert(trigger && overlay, "未找到设置按钮或设置弹窗");

              trigger.click();
              await waitFor(
                () => overlay.classList.contains("active"),
                "设置弹窗打开",
              );
              assert(
                overlay.querySelector('[role="dialog"]'),
                "设置弹窗缺少 dialog 容器",
              );

              const closeButton = doc.getElementById("settings-modal-close");
              assert(closeButton, "未找到设置弹窗关闭按钮");
              closeButton.click();
              await waitFor(
                () => !overlay.classList.contains("active"),
                "设置弹窗关闭",
              );
              return "#game-settings-btn → #settings-modal-overlay → #settings-modal-close";
            });

            await step("宠物导航可打开弹窗、切到背包并关闭", async () => {
              const doc = frame.contentDocument;
              const trigger = doc.querySelector('.nav-btn[data-tab="pet"]');
              assert(trigger, "未找到宠物导航按钮");

              trigger.click();
              await waitFor(() => doc.getElementById("pet-modal"), "宠物弹窗打开");

              assert(
                doc.getElementById("pet-modal-title")?.textContent === "宠物中枢",
                "宠物中枢标题未渲染",
              );
              const overviewText = doc.querySelector("#pet-modal .pet-roster-overview")?.textContent || "";
              assert(overviewText.includes("已收集"), "宠物中枢未展示收集概览");
              assert(overviewText.includes("已上阵"), "宠物中枢未展示编队概览");
              assert(
                doc.querySelectorAll("#pet-modal .formation-slots .pet-slot").length === 3,
                "编队未展示三个固定席位",
              );

              const formationText = doc.querySelector("#pet-modal .team-stats")?.textContent || "";
              assert(formationText.includes("编队效果"), "编队未展示实际效果区");
              assert(formationText.includes("灼热嗅觉"), "编队未展示探索天赋");
              assert(formationText.includes("熟悉"), "编队未展示羁绊档位");
              assert(formationText.includes("攻击战备 +1"), "编队未展示基地整数奖励");

              const bagTab = doc.querySelector(
                '#pet-modal [data-pet-tab="bag"]',
              );
              assert(bagTab, "未找到宠物背包标签");
              bagTab.click();
              await waitFor(
                () =>
                  doc.querySelector(
                    '#pet-modal [data-pet-tab="bag"][aria-selected="true"]',
                  ),
                "宠物背包标签激活",
              );
              assert(
                doc.querySelector("#pet-modal .pet-bag-list"),
                "宠物背包内容未渲染",
              );
              assert(
                doc.querySelector("#pet-modal .pet-roster-card .pet-specialty-grid"),
                "伙伴名册未展示职责分区",
              );
              const petBagText = doc.querySelector("#pet-modal .pet-bag-list").textContent;
              assert(petBagText.includes("灼热嗅觉"), "宠物探索天赋未展示");
              assert(petBagText.includes("训练陪练"), "宠物基地岗位未展示");
              assert(petBagText.includes("攻击战备 +1"), "宠物背包未展示岗位实际效果");

              const closeButton = doc.querySelector(
                "#pet-modal [data-pet-close]",
              );
              assert(closeButton, "未找到宠物弹窗关闭按钮");
              closeButton.click();
              await waitFor(
                () => !doc.getElementById("pet-modal"),
                "宠物弹窗关闭",
              );
              return "pet → bag (talent + role) → close";
            });

            await step("里程碑可筛选、实时更新、批量领取并关闭", async () => {
              const doc = frame.contentDocument;
              const game = frame.contentWindow.game;
              const trigger = doc.querySelector(
                '.nav-btn[data-tab="achievement"]',
              );
              assert(trigger, "未找到成就导航按钮");
              await waitFor(
                () => doc.getElementById("achievement-claimable-badge")?.textContent === "1",
                "首只宠物里程碑徽标",
              );

              trigger.click();
              await waitFor(
                () => doc.getElementById("achievement-modal"),
                "成就弹窗打开",
              );
              const achievementSummary = game.achievementSystem.getSummary();
              const expectedCompletionPercent = achievementSummary.total > 0
                ? Math.round(
                    (achievementSummary.completed / achievementSummary.total) * 100,
                  )
                : 0;
              assert(
                doc.getElementById("achievement-summary-percent")?.textContent ===
                  `${expectedCompletionPercent}%`,
                "里程碑总完成度未正确展示",
              );
              assert(
                doc.querySelector(
                  '#achievement-modal [data-achievement-tab="all"] [data-achievement-tab-count]',
                )?.textContent ===
                  `${achievementSummary.completed} / ${achievementSummary.total}`,
                "全部分类缺少分项完成进度",
              );
              assert(
                doc.querySelector(
                  '#achievement-modal [data-achievement-id="pet_first"].achievement-state-claimable .achievement-reward-token',
                ),
                "可领取里程碑缺少新版奖章卡与奖励筹码",
              );

              const expeditionTab = doc.querySelector(
                '#achievement-modal [data-achievement-tab="expedition"]',
              );
              assert(expeditionTab, "未找到远征分类");
              assert(
                expeditionTab.getAttribute("aria-controls") === "achievement-panel",

              }, "行动中退出确认打开");
              assert(overlay.dataset.runActive === "true", "行动中退出确认缺少风险状态");
              assert(overlay.dataset.exitRisk === "abandoned", "安全行进阶段退出风险分类错误");
              assert(
                doc.getElementById("expedition-exit-message")?.textContent.includes("安全止损")
                  && doc.getElementById("expedition-exit-message")?.textContent.includes("30% 金币与 40% 经验"),
                "安全行进阶段退出确认未说明准确止损规则",
              );
              assert(game.combatSystem.isPaused, "确认退出界面没有暂停战斗");

              doc.getElementById("expedition-exit-confirm")?.click();
              await waitFor(
                () => game.currentScene === "territory",
                "确认退出后返回领地",
              );

              const url = new URL(gameWindow.location.href);
              const scene = doc.getElementById("territory-scene");
              const globalHud = doc.querySelector(".game-hud-controls");
              assert(url.searchParams.get("scene") === "territory", "领地场景未写入 URL");
              assert(scene?.style.display === "flex", "领地场景容器未显示");
              assert(!game.combatSystem.runSystem.active, "确认退出后远征仍在进行");
              assert(game.combatSystem.lastSettlement?.reason === "abandoned", "退出未按主动放弃结算");
              assert(game.combatSystem.meta.losses === beforeLosses + 1, "主动放弃未记录本局失败");
              assert(!globalHud.hidden, "返回领地后全局 HUD 未恢复");
              assert(!globalHud.hasAttribute("inert"), "返回领地后全局 HUD 仍不可交互");
              assert(globalHud.getAttribute("aria-hidden") === "false", "返回领地后全局 HUD 仍对读屏隐藏");
              assert(gameWindow.getComputedStyle(globalHud).display !== "none", "领地全局 HUD 仍不可见");
              savedScene = "territory";
              return `${url.search} · losses ${beforeLosses} → ${game.combatSystem.meta.losses}`;
            });

            await step("领地等级紧邻标题右侧且资源信息保持独立", () => {
              const doc = frame.contentDocument;
              const scorebar = doc.querySelector(".territory-scorebar");
              const title = doc.querySelector(".territory-scorebar-title");
              const resources = doc.querySelector(".territory-resource-strip");
              const rank = doc.querySelector(".territory-scorebar-rank");
              assert(scorebar && title && resources && rank, "领地标题栏缺少资源布局节点");
              assert(scorebar.contains(resources), "领地资源信息仍在场景画布内");

              const scorebarRect = scorebar.getBoundingClientRect();
              const titleRect = title.getBoundingClientRect();
              const resourceRect = resources.getBoundingClientRect();
              const rankRect = rank.getBoundingClientRect();
              const resourceItems = Array.from(resources.children);
              const lastResourceRect = resourceItems.at(-1)?.getBoundingClientRect();
              assert(resourceRect.top >= scorebarRect.top, "资源信息超出标题栏顶部");
              assert(resourceRect.bottom <= scorebarRect.bottom, "资源信息超出标题栏底部");
              assert(rankRect.left >= titleRect.right, "领地等级与标题重叠");
              assert(rankRect.left - titleRect.right <= 24, "领地等级没有紧邻标题右侧");
              assert(resourceRect.left >= rankRect.right, "资源信息与领地等级重叠");
              assert(resourceRect.right <= scorebarRect.right, "资源信息超出标题栏右侧");
              assert(lastResourceRect, "资源栏缺少可见资源项");
              assert(resourceRect.right - lastResourceRect.right <= 1, "资源卡片没有靠右对齐");
              return `titlebar=${Math.round(scorebarRect.height)}px · right-gap=${Math.round(resourceRect.right - lastResourceRect.right)}px`;
            });

            await step("领地移动与交互控件保持紧凑可触控", () => {
              const doc = frame.contentDocument;
              const moveButton = doc.querySelector(".territory-move-btn");
              const interactButton = doc.getElementById("territory-interact-btn");
              assert(moveButton && interactButton, "领地操作区缺少移动或交互控件");
              const moveRect = moveButton.getBoundingClientRect();
              const interactRect = interactButton.getBoundingClientRect();
              assert(moveRect.width >= 44 && moveRect.width <= 46, "移动按钮尺寸不在紧凑触控范围");
              assert(moveRect.height >= 44 && moveRect.height <= 48, "移动按钮高度不在紧凑触控范围");
              assert(interactRect.height >= 44 && interactRect.height <= 48, "交互面板高度不在紧凑触控范围");
              assert(interactRect.width <= 230, "交互面板仍然过宽");
              return `move=${Math.round(moveRect.width)}×${Math.round(moveRect.height)} · interact=${Math.round(interactRect.width)}×${Math.round(interactRect.height)}`;
            });

            await step("领地小地图位于右上角目标区域", () => {
              const controller = frame.contentWindow.game.territorySceneController;
              const layout = controller.getMinimapLayout();
              const canvas = frame.contentDocument.getElementById("territoryCanvas");
              assert(layout.rightInset >= 24, `小地图右侧仅留 ${layout.rightInset}px`);
              assert(layout.topInset >= 12, `小地图顶部仅留 ${layout.topInset}px`);
              assert(layout.topInset <= 24, `小地图没有上移到目标区域：${layout.topInset}px`);
              assert(layout.frameX >= 0 && layout.frameY >= 0, "小地图越出画布左侧或顶部");
              assert(
                layout.frameX + layout.frameWidth <= canvas.width - layout.rightInset + 0.5,
                "小地图越出右侧安全区",
              );
              return `top=${layout.topInset}px · right=${layout.rightInset}px`;
            });

            await step("领地目标默认紧凑并可按需展开详情", () => {
              const doc = frame.contentDocument;
              const panel = doc.getElementById("territory-objective-hud");
              const toggle = doc.getElementById("territory-objective-toggle");
              const details = doc.getElementById("territory-objective-more");
              assert(panel && toggle && details, "领地目标 HUD 缺少紧凑详情结构");

              const compactHeight = panel.getBoundingClientRect().height;
              assert(compactHeight <= 50, `领地目标 HUD 默认高度过大：${compactHeight}px`);
              assert(details.hidden, "领地目标详情默认没有收起");
              assert(toggle.getAttribute("aria-expanded") === "false", "领地目标初始状态错误");

              toggle.click();
              const expandedHeight = panel.getBoundingClientRect().height;
              assert(!details.hidden, "点击后领地目标详情没有展开");
              assert(toggle.getAttribute("aria-expanded") === "true", "领地展开按钮状态没有同步");
              assert(expandedHeight > compactHeight, "展开领地目标后面板高度没有变化");

              toggle.click();
              assert(details.hidden, "再次点击后领地目标详情没有收起");
              return `${Math.round(compactHeight)}px → ${Math.round(expandedHeight)}px → 收起`;
            });

            await step("在实际基地世界中靠近遗迹并修复主基地", async () => {
              const game = frame.contentWindow.game;
              const doc = frame.contentDocument;
              const territory = game.territorySystem;
              assert(
                territory.buildings.length === 0,
                `新存档已有 ${territory.buildings.length} 座建筑`,
              );

              game.fateCoinSystem.totalFlips = 8;
              game.combatSystem.meta.extractions = 1;
              game.combatSystem.meta.bestExtractedDepth = Math.max(
                1,
                game.combatSystem.meta.bestExtractedDepth || 0,
              );
              game.updateUI();
              const goalRoute = doc.getElementById("fate-next-goal-route");
              assert(goalRoute?.tagName === "BUTTON", "下一目标入口不是可操作按钮");
              assert(!goalRoute.disabled, "领地目标入口不可操作");
              assert(goalRoute.dataset.scene === "territory", "下一目标入口没有绑定领地场景");
              assert(goalRoute.textContent.includes("前往领地"), "下一目标入口文案不明确");

              const canvas = doc.getElementById("territoryCanvas");
              assert(canvas instanceof frame.contentWindow.HTMLCanvasElement, "未找到领地 Canvas");
              assert(canvas.width > 0 && canvas.height > 0, "领地 Canvas 尚未完成适配");
              await waitFor(
                () => game.territorySceneController.world.getNearbySite()?.type === "main_base",
                "角色抵达主基地遗迹",
              );
              assert(
                !doc.getElementById("territory-nearby-prompt"),
                "领地仍显示靠近建筑时的浮动标签",
              );
              assert(
                !doc.getElementById("territory-event-feed"),
                "领地仍显示常驻操作提示栏",
              );
              const interact = doc.getElementById("territory-interact-btn");
              assert(interact && !interact.disabled, "主基地遗迹附近没有可用交互");
              assert(
                doc.getElementById("territory-interact-label")?.textContent.includes("主基地"),
                "右下角交互按钮没有保留建筑名称",
              );
              assert(
                doc.getElementById("territory-interact-detail")?.textContent.includes("按 E"),
                "右下角交互按钮没有保留键盘提示",
              );
              interact.click();

              const panel = await waitFor(() => {
                const candidate = doc.getElementById("territory-context-panel");
                return candidate && !candidate.hidden ? candidate : null;
              }, "基地操作面板打开");
              const buildButton = panel.querySelector('[data-territory-action="build"]');
              assert(buildButton && !buildButton.hidden, "基地操作面板未显示修复动作");
              assert(!buildButton.disabled, "免费主基地不可修复");
              buildButton.click();

              const building = await waitFor(
                () =>
                  territory.buildings.length === 1
                    ? territory.buildings[0]
                    : null,
                "主基地建造结算",
              );
              await waitFor(
                () =>
                  territory.rank === 1 &&
                  doc.getElementById("territory-rank-badge")?.textContent?.startsWith("R1"),
                "主基地世界状态与 HUD 渲染",
              );
              await waitFor(
                () => {
                  const image = game.territorySceneController.buildingImages.main_base;
                  return image?.complete && image.naturalWidth > 0;
                },
                "主基地图片资产加载",
              );
              assert(building.type === "main_base", `建筑类型异常：${building.type}`);
              assert(building.slotIndex === 0, `建筑地块异常：${building.slotIndex}`);
              savedBuilding = {
                count: territory.buildings.length,
                type: building.type,
                slotIndex: building.slotIndex,
              };
              return `${building.type} · slot=${building.slotIndex} · rank=${territory.rank} · world=${game.territorySceneController.world.width}`;
            });

            await step("基地设施面板显示宠物岗位实际效果", async () => {
              const game = frame.contentWindow.game;
              const doc = frame.contentDocument;
              const territory = game.territorySystem;
              assert(territory.debugBuildBuilding("training_ground"), "测试训练场创建失败");
              game.territorySceneController.syncProgress();
              game.territorySceneController.updateDisplay();
              game.territorySceneController.selectedSiteType = "training_ground";
              game.territorySceneController.renderContextPanel("training_ground");

              const panel = doc.getElementById("territory-context-panel");
              const panelText = panel?.textContent || "";
              assert(panel && !panel.hidden, "训练场设施面板未显示");
              assert(panelText.includes("火焰犬 · 训练陪练 / 熟悉"), "基地面板未显示岗位档位");
              assert(panelText.includes("攻击战备 +1"), "基地面板未显示岗位整数奖励");
              savedBuilding.count = territory.buildings.length;
              game.territorySceneController.closeContextPanel();
              return "火焰犬 · 训练陪练 / 熟悉 · 攻击战备 +1";
            });

            await step("远征结算显示实际羁绊增长与满值反馈", async () => {
              const game = frame.contentWindow.game;
              const doc = frame.contentDocument;
              const settlement = {
                runId: "browser-bond-preview",
                extracted: true,
                depth: 4,
                kills: 3,
                coins: 120,
                crystals: 4,
                exp: 60,
                petBond: {
                  pets: [
                    { petName: "火焰犬", gain: 0, friendship: 100 },
                    { petName: "冰霜猫", gain: 2, friendship: 42 },
                  ],
                },
              };
              const activeSaveSystem = game.battleSceneController.saveSystem;
              game.battleSceneController.saveSystem = null;
              game.battleSceneController.handleSettlement({ settlement });
              game.battleSceneController.saveSystem = activeSaveSystem;
              const toast = await waitFor(() => {
                return Array.from(doc.querySelectorAll("#toast-container .toast")).find(
                  (candidate) => (
                    candidate.textContent?.includes("火焰犬") &&
                    candidate.textContent?.includes("羁绊已满")
                  ),
                ) || null;
              }, "满羁绊结算提示");
              assert(
                toast.textContent.includes("冰霜猫") && toast.textContent.includes("羁绊 +2"),
                "结算未显示实际羁绊增长",
              );
              const tip = game.battleSceneController.getTip({ settlement });
              assert(
                tip.includes("火焰犬") && tip.includes("羁绊已满"),
                "结算说明未显示满值反馈",
              );
              assert(
                tip.includes("冰霜猫") && tip.includes("羁绊 +2"),
                "结算说明未显示实际增长",
              );
              return "火焰犬羁绊已满 · 冰霜猫羁绊 +2";
            });

            await step("通过 F5 快捷键保存槽位 1", async () => {
              const gameWindow = frame.contentWindow;
              const beforeTimestamp = parseSlotOneSave()?.timestamp || 0;
              const event = new gameWindow.KeyboardEvent("keydown", {
                key: "F5",
                code: "F5",
                bubbles: true,
                cancelable: true,
              });
              gameWindow.document.dispatchEvent(event);

              const save = await waitFor(() => {
                const candidate = parseSlotOneSave();
                return candidate?.timestamp > beforeTimestamp ? candidate : null;
              }, "F5 存档写入");

              assert(event.defaultPrevented, "F5 未被游戏快捷键处理");
              assert(save.version && save.data?.fate, "槽位 1 缺少有效命运数据");
              savedFate = { ...save.data.fate };
              assert(savedFate.fateCoins >= 2, "存档未包含购买后的桌面硬币");
              assert(savedFate.assistants >= 1, "存档未包含招募后的助手");
              assert(savedFate.totalFlips >= 1, "存档未包含手动翻转进度");
              assert(savedBuilding, "保存前未完成主基地建造");
              assert(
                save.data.territory?.buildings?.length === savedBuilding.count,
                "存档未包含建造后的主基地",
              );
              assert(
                save.data.territory.buildings[0]?.type === savedBuilding.type,
                "存档中的建筑类型不一致",
              );
              return `fateCoins=${savedFate.fateCoins} · assistants=${savedFate.assistants} · totalFlips=${savedFate.totalFlips} · buildings=${savedBuilding.count}`;
            });

            await step("重载 iframe 并恢复进度与场景", async () => {
              const previousDocument = frame.contentDocument;
              frame.contentWindow.location.reload();

              const game = await waitFor(
                () =>
                  frame.contentDocument !== previousDocument &&
                  frame.contentWindow?.game?.isInitialized &&
                  frame.contentWindow.game,
                "iframe 重载与游戏重新初始化",
              );
              const restored = game.fateCoinSystem.getSaveData();
              const restoredBuildings = game.territorySystem.buildings;
              const currentUrl = new URL(frame.contentWindow.location.href);

              assert(
                restored.fateCoins === savedFate.fateCoins,
                `桌面硬币恢复不一致：${restored.fateCoins} !== ${savedFate.fateCoins}`,
              );
              assert(
                restored.assistants === savedFate.assistants,
                `助手恢复不一致：${restored.assistants} !== ${savedFate.assistants}`,
              );
              assert(
                restored.totalFlips >= savedFate.totalFlips,
                `翻转进度倒退：${restored.totalFlips} < ${savedFate.totalFlips}`,
              );
              assert(game.currentScene === savedScene, "重载后未恢复领地场景");
              assert(
                currentUrl.searchParams.get("scene") === savedScene,
                "重载后 URL 未保留领地场景",
              );
              assert(
                frame.contentDocument
                  .querySelector('.nav-btn[data-tab="territory"]')
                  ?.classList.contains("active"),
                "重载后领地导航未激活",
              );
              assert(savedBuilding, "重载前未记录主基地状态");
              assert(
                restoredBuildings.length === savedBuilding.count,
                `建筑恢复不一致：${restoredBuildings.length} !== ${savedBuilding.count}`,
              );
              assert(
                restoredBuildings[0]?.type === savedBuilding.type &&
                  restoredBuildings[0]?.slotIndex === savedBuilding.slotIndex,
                "重载后主基地类型或地块不一致",
              );
              assert(game.territorySystem.rank === 1, "重载后领地等级未恢复");
              assert(
                frame.contentDocument.getElementById("territory-rank-badge")?.textContent?.startsWith("R1"),
                "重载后主基地状态未同步到实际基地 HUD",
              );
              assert(
                frame.contentDocument.getElementById("territoryCanvas") instanceof frame.contentWindow.HTMLCanvasElement,
                "重载后实际基地 Canvas 未恢复",
              );
              return `硬币 ${restored.fateCoins} · 助手 ${restored.assistants} · 翻转 ${restored.totalFlips} · 建筑 ${restoredBuildings.length} · scene=${game.currentScene}`;
            });

            await step("领地画布脱离 DOM 后控制器仍可安全重绑", () => {
              const game = frame.contentWindow.game;
              const controller = game.territorySceneController;
              const canvas = frame.contentDocument.getElementById("territoryCanvas");
              assert(controller && canvas, "缺少领地控制器或画布");
              controller.destroy();
              canvas.remove();
              controller.bind();
              controller.destroy();
              assert(controller.resizeObserver === null, "销毁后仍残留 ResizeObserver");
              return "detached canvas bind/destroy ok";
            });
          } catch (error) {
            result.error = error?.message || String(error);
          } finally {
            try {
              cleanup();
              assert(snapshotReady, "测试开始前未完成 localStorage 快照");
              assert(snapshotMatchesStorage(), "PetPlan localStorage 未完整恢复");
              record(
                "pass",
                "移除 iframe 并恢复原有存档",
                `已恢复 ${storageSnapshot.size} 个 petplan_* 键`,
              );
            } catch (error) {
              result.error ||= error?.message || String(error);
              record("fail", "移除 iframe 并恢复原有存档", result.error);
            }

            result.done = true;
            result.ok = result.counts.failed === 0;
            result.status = result.ok ? "passed" : "failed";
            result.finishedAt = new Date().toISOString();
            statusEl.textContent = result.ok ? "全部通过" : "测试失败";
            statusEl.className = result.status;
            document.title = result.ok
              ? "✓ PetPlan 浏览器冒烟测试"
              : "✕ PetPlan 浏览器冒烟测试";
          }
        }

        run();
      })();
    </script>
  </body>
</html>
