<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PetPlan 浏览器冒烟测试</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background: #111827;
        color: #e5e7eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        background:
          radial-gradient(circle at top right, #1e3a5f 0, transparent 38%),
          #111827;
      }

      main {
        width: min(1120px, 100%);
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-family: system-ui, sans-serif;
        font-size: clamp(24px, 4vw, 38px);
      }

      .description {
        margin: 0 0 20px;
        color: #9ca3af;
        line-height: 1.6;
      }

      .summary,
      .results,
      .frame-shell {
        border: 1px solid #374151;
        border-radius: 12px;
        background: rgb(17 24 39 / 82%);
        box-shadow: 0 18px 50px rgb(0 0 0 / 24%);
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 24px;
        align-items: center;
        padding: 14px 18px;
      }

      #status {
        font-weight: 700;
        color: #fbbf24;
      }

      #status.passed {
        color: #34d399;
      }

      #status.failed {
        color: #f87171;
      }

      #counts {
        color: #9ca3af;
      }

      .results {
        margin: 16px 0;
        padding: 0;
        overflow: hidden;
        list-style: none;
      }

      .results:empty::before {
        display: block;
        padding: 16px 18px;
        color: #9ca3af;
        content: "等待测试开始…";
      }

      .result {
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr);
        gap: 10px;
        padding: 13px 18px;
        border-bottom: 1px solid #273244;
      }

      .result:last-child {
        border-bottom: 0;
      }

      .result.pass .icon {
        color: #34d399;
      }

      .result.fail .icon {
        color: #f87171;
      }

      .result strong {
        display: block;
        font-family: system-ui, sans-serif;
      }

      .detail {
        display: block;
        margin-top: 4px;
        color: #9ca3af;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .frame-shell {
        min-height: 360px;
        padding: 10px;
      }

      #frame-host {
        min-height: 340px;
      }

      #frame-host:empty {
        display: grid;
        place-items: center;
        color: #6b7280;
      }

      #frame-host:empty::before {
        content: "测试完成后，游戏 iframe 会自动移除";
      }

      iframe {
        display: block;
        width: 100%;
        height: min(68vw, 630px);
        min-height: 340px;
        border: 0;
        border-radius: 8px;
        background: #020617;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PetPlan 浏览器冒烟测试</h1>
      <p class="description">
        自动验证第二阶段控制器接线、弹窗与分类交互、命运桌成长、远征搜打撤、
        领地建造及 F5 存档恢复。测试会临时隔离并在结束时恢复当前来源下的
        PetPlan 存档。
      </p>

      <section class="summary" aria-live="polite">
        <span id="status">运行中…</span>
        <span id="counts">通过 0 · 失败 0</span>
      </section>

      <ol class="results" id="results" aria-label="测试结果"></ol>

      <section class="frame-shell" aria-label="被测游戏">
        <div id="frame-host"></div>
      </section>
    </main>

    <script>
      (() => {
        "use strict";

        const result = {
          status: "running",
          done: false,
          ok: false,
          startedAt: new Date().toISOString(),
          finishedAt: null,
          error: null,
          counts: { passed: 0, failed: 0, total: 0 },
          checks: [],
        };
        window.__PETPLAN_BROWSER_SMOKE__ = result;

        const statusEl = document.getElementById("status");
        const countsEl = document.getElementById("counts");
        const resultsEl = document.getElementById("results");
        const frameHost = document.getElementById("frame-host");
        const storageSnapshot = new Map();
        let snapshotReady = false;
        let cleanupDone = false;
        let frame = null;

        function getPetPlanStorageKeys() {
          const keys = [];
          for (let index = 0; index < localStorage.length; index += 1) {
            const key = localStorage.key(index);
            if (key && key.startsWith("petplan_")) keys.push(key);
          }
          return keys.sort();
        }

        function refreshSummary() {
          result.counts.passed = result.checks.filter(
            (check) => check.status === "pass",
          ).length;
          result.counts.failed = result.checks.filter(
            (check) => check.status === "fail",
          ).length;
          result.counts.total = result.checks.length;
          countsEl.textContent = `通过 ${result.counts.passed} · 失败 ${result.counts.failed}`;
        }

        function record(status, name, detail = "") {
          const check = { status, name, detail: String(detail || "") };
          result.checks.push(check);

          const item = document.createElement("li");
          item.className = `result ${status}`;

          const icon = document.createElement("span");
          icon.className = "icon";
          icon.setAttribute("aria-hidden", "true");
          icon.textContent = status === "pass" ? "✓" : "✕";

          const content = document.createElement("span");
          const title = document.createElement("strong");
          title.textContent = name;
          content.appendChild(title);

          if (check.detail) {
            const detailEl = document.createElement("span");
            detailEl.className = "detail";
            detailEl.textContent = check.detail;
            content.appendChild(detailEl);
          }

          item.append(icon, content);
          resultsEl.appendChild(item);
          refreshSummary();
          return check;
        }

        function assert(condition, message) {
          if (!condition) throw new Error(message);
        }

        async function step(name, callback) {
          try {
            const detail = await callback();
            record("pass", name, detail);
            return detail;
          } catch (error) {
            record("fail", name, error?.message || error);
            throw error;
          }
        }

        function waitFor(predicate, label, timeout = 20000) {
          const startedAt = performance.now();
          let lastError = null;

          return new Promise((resolve, reject) => {
            const poll = () => {
              try {
                const value = predicate();
                if (value) {
                  resolve(value);
                  return;
                }
              } catch (error) {
                lastError = error;
              }

              if (performance.now() - startedAt >= timeout) {
                const suffix = lastError
                  ? `；最后错误：${lastError.message || lastError}`
                  : "";
                reject(new Error(`等待${label}超时（${timeout}ms）${suffix}`));
                return;
              }

              window.setTimeout(poll, 50);
            };

            poll();
          });
        }

        function parseSlotOneSave() {
          const serialized = localStorage.getItem("petplan_save_1");
          if (!serialized) return null;
          try {
            return JSON.parse(serialized);
          } catch (error) {
            throw new Error(`槽位 1 不是有效 JSON：${error.message}`);
          }
        }

        function snapshotMatchesStorage() {
          const currentKeys = getPetPlanStorageKeys();
          if (currentKeys.length !== storageSnapshot.size) return false;
          return currentKeys.every(
            (key) => localStorage.getItem(key) === storageSnapshot.get(key),
          );
        }

        function cleanup() {
          if (cleanupDone) return;

          if (frame?.isConnected) frame.remove();
          frame = null;

          if (snapshotReady) {
            getPetPlanStorageKeys().forEach((key) => localStorage.removeItem(key));
            storageSnapshot.forEach((value, key) => {
              localStorage.setItem(key, value);
            });
          }

          cleanupDone = true;
        }

        window.addEventListener("pagehide", cleanup, { once: true });

        async function run() {
          let savedFate = null;
          let savedScene = null;
          let savedBuilding = null;

          try {
            await step("隔离现有 PetPlan 存档", () => {
              getPetPlanStorageKeys().forEach((key) => {
                storageSnapshot.set(key, localStorage.getItem(key));
              });
              snapshotReady = true;
              getPetPlanStorageKeys().forEach((key) => localStorage.removeItem(key));
              assert(
                getPetPlanStorageKeys().length === 0,
                "未能清空测试所需的 PetPlan localStorage 键",
              );
              return `已快照 ${storageSnapshot.size} 个 petplan_* 键`;
            });

            await step("同源 iframe 加载并初始化游戏", async () => {
              frame = document.createElement("iframe");
              frame.title = "PetPlan 被测游戏";
              frame.src = "../index.html?browser-smoke=pet-loop-calibration-20260713a";
              frameHost.appendChild(frame);

              const game = await waitFor(
                () => frame.contentWindow?.game?.isInitialized && frame.contentWindow.game,
                "window.game.isInitialized",
              );
              await waitFor(
                () => frame.contentDocument?.querySelector(".fate-table-coin"),
                "桌面硬币渲染",
              );

              assert(
                frame.contentWindow.location.origin === window.location.origin,
                "iframe 不是同源页面",
              );
              assert(game.currentScene === "fate", "新存档未从命运场景启动");
              return `${frame.contentWindow.location.pathname} · scene=${game.currentScene}`;
            });

            await step("第二阶段的 8 个控制器均已接线", () => {
              const game = frame.contentWindow.game;
              const controllerNames = [
                "achievementController",
                "battleSceneController",
                "fateSceneController",
                "petModalController",
                "playerModalController",
                "settingsController",
                "shopRecommendationController",
                "territorySceneController",
              ];
              const missing = controllerNames.filter(
                (name) => !game[name] || typeof game[name] !== "object",
              );

              assert(
                missing.length === 0,
                `缺少控制器：${missing.join("、")}`,
              );
              return controllerNames.join(" · ");
            });

            await step("玩家按钮可打开并关闭玩家弹窗", async () => {
              const doc = frame.contentDocument;
              const trigger = doc.getElementById("game-player-btn");
              const overlay = doc.getElementById("player-modal-overlay");
              assert(trigger && overlay, "未找到玩家按钮或玩家弹窗");

              trigger.click();
              await waitFor(
                () => overlay.classList.contains("active"),
                "玩家弹窗打开",
              );
              assert(
                overlay.querySelector('[role="dialog"]'),
                "玩家弹窗缺少 dialog 容器",
              );

              const closeButton = doc.getElementById("player-modal-close");
              assert(closeButton, "未找到玩家弹窗关闭按钮");
              closeButton.click();
              await waitFor(
                () => !overlay.classList.contains("active"),
                "玩家弹窗关闭",
              );
              return "#game-player-btn → #player-modal-overlay → #player-modal-close";
            });

            await step("设置按钮可打开并关闭设置弹窗", async () => {
              const doc = frame.contentDocument;
              const trigger = doc.getElementById("game-settings-btn");
              const overlay = doc.getElementById("settings-modal-overlay");
              assert(trigger && overlay, "未找到设置按钮或设置弹窗");

              trigger.click();
              await waitFor(
                () => overlay.classList.contains("active"),
                "设置弹窗打开",
              );
              assert(
                overlay.querySelector('[role="dialog"]'),
                "设置弹窗缺少 dialog 容器",
              );

              const closeButton = doc.getElementById("settings-modal-close");
              assert(closeButton, "未找到设置弹窗关闭按钮");
              closeButton.click();
              await waitFor(
                () => !overlay.classList.contains("active"),
                "设置弹窗关闭",
              );
              return "#game-settings-btn → #settings-modal-overlay → #settings-modal-close";
            });

            await step("宠物导航可打开弹窗、切到背包并关闭", async () => {
              const doc = frame.contentDocument;
              const trigger = doc.querySelector('.nav-btn[data-tab="pet"]');
              assert(trigger, "未找到宠物导航按钮");

              trigger.click();
              await waitFor(() => doc.getElementById("pet-modal"), "宠物弹窗打开");

              assert(
                doc.getElementById("pet-modal-title")?.textContent === "宠物中枢",
                "宠物中枢标题未渲染",
              );
              const overviewText = doc.querySelector("#pet-modal .pet-roster-overview")?.textContent || "";
              assert(overviewText.includes("已收集"), "宠物中枢未展示收集概览");
              assert(overviewText.includes("已上阵"), "宠物中枢未展示编队概览");
              assert(
                doc.querySelectorAll("#pet-modal .formation-slots .pet-slot").length === 3,
                "编队未展示三个固定席位",
              );

              const formationText = doc.querySelector("#pet-modal .team-stats")?.textContent || "";
              assert(formationText.includes("编队效果"), "编队未展示实际效果区");
              assert(formationText.includes("灼热嗅觉"), "编队未展示探索天赋");
              assert(formationText.includes("熟悉"), "编队未展示羁绊档位");
              assert(formationText.includes("攻击战备 +1"), "编队未展示基地整数奖励");

              const bagTab = doc.querySelector(
                '#pet-modal [data-pet-tab="bag"]',
              );
              assert(bagTab, "未找到宠物背包标签");
              bagTab.click();
              await waitFor(
                () =>
                  doc.querySelector(
                    '#pet-modal [data-pet-tab="bag"][aria-selected="true"]',
                  ),
                "宠物背包标签激活",
              );
              assert(
                doc.querySelector("#pet-modal .pet-bag-list"),
                "宠物背包内容未渲染",
              );
              assert(
                doc.querySelector("#pet-modal .pet-roster-card .pet-specialty-grid"),
                "伙伴名册未展示职责分区",
              );
              const petBagText = doc.querySelector("#pet-modal .pet-bag-list").textContent;
              assert(petBagText.includes("灼热嗅觉"), "宠物探索天赋未展示");
              assert(petBagText.includes("训练陪练"), "宠物基地岗位未展示");
              assert(petBagText.includes("攻击战备 +1"), "宠物背包未展示岗位实际效果");

              const closeButton = doc.querySelector(
                "#pet-modal [data-pet-close]",
              );
              assert(closeButton, "未找到宠物弹窗关闭按钮");
              closeButton.click();
              await waitFor(
                () => !doc.getElementById("pet-modal"),
                "宠物弹窗关闭",
              );
              return "pet → bag (talent + role) → close";
            });

            await step("里程碑可筛选、实时更新、批量领取并关闭", async () => {
              const doc = frame.contentDocument;
              const game = frame.contentWindow.game;
              const trigger = doc.querySelector(
                '.nav-btn[data-tab="achievement"]',
              );
              assert(trigger, "未找到成就导航按钮");
              await waitFor(
                () => doc.getElementById("achievement-claimable-badge")?.textContent === "1",
                "首只宠物里程碑徽标",
              );

              trigger.click();
              await waitFor(
                () => doc.getElementById("achievement-modal"),
                "成就弹窗打开",
              );
              assert(
                doc.getElementById("achievement-summary-percent")?.textContent === "4%",
                "里程碑总完成度未正确展示",
              );
              assert(
                doc.querySelector(
                  '#achievement-modal [data-achievement-tab="all"] [data-achievement-tab-count]',
                )?.textContent === "1 / 23",
                "全部分类缺少分项完成进度",
              );
              assert(
                doc.querySelector(
                  '#achievement-modal [data-achievement-id="pet_first"].achievement-state-claimable .achievement-reward-token',
                ),
                "可领取里程碑缺少新版奖章卡与奖励筹码",
              );

              const expeditionTab = doc.querySelector(
                '#achievement-modal [data-achievement-tab="expedition"]',
              );
              assert(expeditionTab, "未找到远征分类");
              assert(
                expeditionTab.getAttribute("aria-controls") === "achievement-panel",
                "远征分类缺少面板关联",
              );
              expeditionTab.click();
              await waitFor(
                () =>
                  doc.querySelector(
                    '#achievement-modal [data-achievement-tab="expedition"][aria-selected="true"]',
                  ),
                "远征分类激活",
              );

              const allTab = doc.querySelector(
                '#achievement-modal [data-achievement-tab="all"]',
              );
              assert(allTab, "未找到全部分类");
              allTab.click();
              game.achievementSystem.updateProgress(
                { totalFlips: 10, unlockedPets: 1 },
                { announce: false },
              );
              await waitFor(
                () =>
                  doc.querySelector(
                    '#achievement-modal [data-achievement-id="fate_10"].achievement-state-claimable .achievement-status',
                  )?.textContent === "可领取",
                "打开弹窗时实时刷新里程碑",
              );

              const claimAllButton = doc.querySelector(
                "#achievement-modal [data-achievement-claim-all]",
              );
              assert(claimAllButton && !claimAllButton.disabled, "全部领取按钮未启用");
              claimAllButton.click();
              await waitFor(
                () =>
                  doc.getElementById("achievement-claimable-badge")?.hidden &&
                  doc.querySelector("#achievement-modal [data-achievement-claim-all]")?.disabled,
                "批量领取完成并清空徽标",
              );

              const closeButton = doc.querySelector(
                "#achievement-modal [data-achievement-close]",
              );
              assert(closeButton, "未找到成就弹窗关闭按钮");
              closeButton.click();
              await waitFor(
                () => !doc.getElementById("achievement-modal"),
                "成就弹窗关闭",
              );
              return "badge → expedition → live progress → claim all → close";
            });

            await step("点击桌面硬币并增加翻转进度", async () => {
              const game = frame.contentWindow.game;
              const fate = game.fateCoinSystem;
              const before = fate.getSaveData();
              const coin = frame.contentDocument.querySelector(".fate-table-coin");

              assert(coin instanceof frame.contentWindow.HTMLButtonElement, "未找到可点击的桌面硬币");
              coin.click();

              await waitFor(
                () => fate.totalFlips >= before.totalFlips + before.manualPower,
                "手动翻转结算",
              );
              assert(
                fate.heads + fate.tails >= before.heads + before.tails + before.manualPower,
                "点击未增加正面或反面资源",
              );
              assert(coin.classList.contains("clicked"), "桌面硬币未触发点击反馈");
              return `翻转 ${before.totalFlips} → ${fate.totalFlips}`;
            });

            await step("推荐筛选与命运、自动分类可切换", async () => {
              const doc = frame.contentDocument;
              const recommended = doc.querySelector(
                '[data-fate-shop-filter="recommended"]',
              );
              const fateFilter = doc.querySelector(
                '[data-fate-shop-filter="fate"]',
              );
              const autoFilter = doc.querySelector(
                '[data-fate-shop-filter="auto"]',
              );
              assert(
                recommended && fateFilter && autoFilter,
                "命运商店分类按钮不完整",
              );

              recommended.click();
              await waitFor(
                () => recommended.getAttribute("aria-pressed") === "true",
                "推荐分类激活",
              );
              const recommendedCards = Array.from(
                doc.querySelectorAll(".fate-upgrade[data-fate-action]"),
              ).filter((card) => !card.hidden);
              assert(recommendedCards.length > 0, "推荐分类没有可见卡片");
              assert(
                recommendedCards.every((card) =>
                  ["primary", "secondary"].includes(
                    card.dataset.recommendation,
                  ),
                ),
                "推荐分类显示了非推荐卡片",
              );

              fateFilter.click();
              await waitFor(
                () => fateFilter.getAttribute("aria-pressed") === "true",
                "命运分类激活",
              );
              const fateCards = Array.from(
                doc.querySelectorAll(".fate-upgrade[data-fate-action]"),
              ).filter((card) => !card.hidden);
              assert(
                fateCards.length > 0 &&
                  fateCards.every(
                    (card) => card.dataset.fateShopCategory === "fate",
                  ),
                "命运分类显示内容不匹配",
              );
              assert(
                !doc.getElementById("fate-buy-gold-btn")?.hidden,
                "命运分类未显示桌面硬币",
              );
              const goldReason = doc
                .getElementById("fate-buy-gold-btn")
                ?.querySelector(".upgrade-reason")
                ?.textContent || "";
              assert(
                !goldReason.includes("脉冲"),
                `桌面硬币仍显示旧领地脉冲理由：${goldReason}`,
              );

              autoFilter.click();
              await waitFor(
                () => autoFilter.getAttribute("aria-pressed") === "true",
                "自动分类激活",
              );
              const autoCards = Array.from(
                doc.querySelectorAll(".fate-upgrade[data-fate-action]"),
              ).filter((card) => !card.hidden);
              assert(
                autoCards.length > 0 &&
                  autoCards.every(
                    (card) => card.dataset.fateShopCategory === "auto",
                  ),
                "自动分类显示内容不匹配",
              );
              assert(
                !doc.getElementById("fate-buy-assistant-btn")?.hidden,
                "自动分类未显示助手",
              );

              recommended.click();
              await waitFor(
                () =>
                  recommended.getAttribute("aria-pressed") === "true" &&
                  doc.getElementById("fate-shop-title")?.textContent === "推荐",
                "返回推荐分类",
              );
              return `推荐 ${recommendedCards.length} · 命运 ${fateCards.length} · 自动 ${autoCards.length} · ${goldReason}`;
            });

            await step("准备资源并点击购买桌面硬币", async () => {
              const game = frame.contentWindow.game;
              const fate = game.fateCoinSystem;
              const cost = fate.getBuyGoldCoinCost();
              fate.heads = Math.max(fate.heads, cost.heads);
              fate.tails = Math.max(fate.tails, cost.tails || 0);
              fate.notifyChange();

              const filter = frame.contentDocument.querySelector(
                '[data-fate-shop-filter="fate"]',
              );
              const button = frame.contentDocument.getElementById("fate-buy-gold-btn");
              assert(filter && button, "未找到命运商店或购买桌面硬币按钮");
              filter.click();
              assert(!button.hidden && !button.disabled, "购买桌面硬币按钮不可交互");

              const beforeCount = fate.fateCoins;
              button.click();
              await waitFor(
                () => fate.fateCoins === beforeCount + 1,
                "桌面硬币购买结算",
              );
              await waitFor(
                () =>
                  frame.contentDocument.querySelectorAll(".fate-table-coin").length ===
                  fate.fateCoins,
                "桌面硬币数量刷新",
              );
              return `桌面硬币 ${beforeCount} → ${fate.fateCoins}，花费 ${cost.heads} 正面`;
            });

            await step("准备资源并点击招募助手", async () => {
              const game = frame.contentWindow.game;
              const fate = game.fateCoinSystem;
              const cost = fate.getBuyAssistantCost();
              fate.heads = Math.max(fate.heads, cost.heads || 0);
              fate.tails = Math.max(fate.tails, cost.tails);
              fate.notifyChange();

              const filter = frame.contentDocument.querySelector(
                '[data-fate-shop-filter="auto"]',
              );
              const button = frame.contentDocument.getElementById(
                "fate-buy-assistant-btn",
              );
              assert(filter && button, "未找到自动商店或助手按钮");
              filter.click();
              assert(!button.hidden && !button.disabled, "助手按钮不可交互");

              const beforeCount = fate.assistants;
              button.click();
              await waitFor(
                () => fate.assistants === beforeCount + 1,
                "助手招募结算",
              );
              await waitFor(
                () =>
                  frame.contentDocument.querySelectorAll(".fate-helper").length ===
                  fate.assistants,
                "助手渲染",
              );
              return `助手 ${beforeCount} → ${fate.assistants}，花费 ${cost.tails} 反面`;
            });

            await step("点击远征导航", async () => {
              const button = frame.contentDocument.querySelector(
                '.nav-btn[data-tab="dungeon"]',
              );
              assert(button, "未找到远征导航按钮");
              button.click();
              await waitFor(
                () => frame.contentWindow.game.currentScene === "dungeon",
                "远征场景激活",
              );

              const url = new URL(frame.contentWindow.location.href);
              const scene = frame.contentDocument.getElementById("battle-scene");
              assert(url.searchParams.get("scene") === "dungeon", "远征场景未写入 URL");
              assert(scene?.style.display === "flex", "远征场景容器未显示");
              return url.search;
            });

            await step("大地图移动、追踪并交互首个搜索地点", async () => {
              const game = frame.contentWindow.game;
              const button = frame.contentDocument.getElementById(
                "battle-start-expedition-btn",
              );
              const before = game.combatSystem.getBattleState();

              assert(button, "未找到开始远征按钮");
              assert(before.phase === "briefing", `开始前阶段不是 briefing：${before.phase}`);
              assert(!button.disabled, "开始远征按钮不可交互");
              button.click();

              const routeState = await waitFor(() => {
                const state = game.combatSystem.getBattleState();
                return state.phase === "route" ? state : null;
              }, "远征路线生成");
              assert(routeState.routeChoices.length === 2, "首层没有生成两条路线");
              assert(
                routeState.world.width > game.gameCore.config.width,
                "远征世界宽度没有与 Canvas 视口解耦",
              );
              assert(
                frame.contentDocument.getElementById("battle-world-controls"),
                "未渲染屏幕移动控件",
              );

              const playerXBefore = routeState.world.player.x;
              frame.contentDocument.dispatchEvent(new frame.contentWindow.KeyboardEvent("keydown", {
                key: "d",
                code: "KeyD",
                bubbles: true,
                cancelable: true,
              }));
              assert(
                game.combatSystem.movementInput.x > 0,
                "D 键输入未传递到远征移动系统",
              );
              // 后台 iframe 的 requestAnimationFrame 可能被浏览器节流；显式推进
              // 一帧可稳定验证输入到世界坐标的完整链路。
              game.combatSystem.update(100);
              frame.contentDocument.dispatchEvent(new frame.contentWindow.KeyboardEvent("keyup", {
                key: "d",
                code: "KeyD",
                bubbles: true,
                cancelable: true,
              }));
              const movedState = game.combatSystem.getBattleState();
              assert(movedState.world.player.x > playerXBefore, "按下 D 后角色没有向右行进");

              const firstRoute = frame.contentDocument.querySelector(
                "#battle-route-list [data-route-id]",
              );
              assert(firstRoute, "未渲染首个路线按钮");
              firstRoute.click();
              await waitFor(
                () => game.combatSystem.getBattleState().world.navigationTarget?.nodeId === routeState.routeChoices[0].id,
                "地图目标追踪",
              );

              const trackedState = game.combatSystem.getBattleState();
              assert(trackedState.phase === "route", "追踪地点不应直接触发事件");
              const targetLocation = trackedState.world.locations.find(
                (location) => location.nodeId === routeState.routeChoices[0].id,
              );
              assert(targetLocation, "未找到首个路线对应的大地图地点");
              const actor = game.playerSystem.player;
              actor.x = targetLocation.x - actor.width / 2;
              actor.y = targetLocation.y - actor.height / 2;
              game.combatSystem.updateWorldAwareness();
              game.battleSceneController.updateBattleDisplay();

              const interactButton = frame.contentDocument.getElementById("battle-interact-btn");
              assert(interactButton && !interactButton.disabled, "靠近地点后交互按钮不可用");
              interactButton.click();
              await waitFor(
                () => game.combatSystem.getBattleState().phase === "search",
                "进入搜索地点",
              );

              game.combatSystem.runSystem.random = () => 0.5;
              const quickSearch = frame.contentDocument.querySelector(
                '[data-search-mode="quick"]',
              );
              assert(quickSearch, "未找到快速搜索按钮");
              assert(quickSearch.textContent.includes("品质 +1"), "搜索按钮未展示宠物实际加成");
              assert(quickSearch.dataset.talentActive === "true", "搜索按钮未标记天赋生效");
              quickSearch.click();

              const after = await waitFor(() => {
                const state = game.combatSystem.getBattleState();
                return state.depth === 1 && state.backpackCount === 1 ? state : null;
              }, "首个搜索区域结算");
              assert(
                frame.contentDocument.getElementById("battle-threat-display")?.textContent === "5%",
                "威胁 HUD 未更新",
              );
              assert(
                frame.contentDocument.getElementById("battle-bag-display")?.textContent === "1/8",
                "背包 HUD 未更新",
              );
              return `world=${routeState.world.width}x${routeState.world.height} · moved=${Math.round(movedState.world.player.x - playerXBefore)} · depth=${after.depth} · bag=${after.backpackCount}`;
            });

            await step("点击领地导航", async () => {
              const button = frame.contentDocument.querySelector(
                '.nav-btn[data-tab="territory"]',
              );
              assert(button, "未找到领地导航按钮");
              button.click();
              await waitFor(
                () => frame.contentWindow.game.currentScene === "territory",
                "领地场景激活",
              );

              const url = new URL(frame.contentWindow.location.href);
              const scene = frame.contentDocument.getElementById("territory-scene");
              assert(url.searchParams.get("scene") === "territory", "领地场景未写入 URL");
              assert(scene?.style.display === "flex", "领地场景容器未显示");
              savedScene = "territory";
              return url.search;
            });

            await step("在实际基地世界中靠近遗迹并修复主基地", async () => {
              const game = frame.contentWindow.game;
              const doc = frame.contentDocument;
              const territory = game.territorySystem;
              assert(
                territory.buildings.length === 0,
                `新存档已有 ${territory.buildings.length} 座建筑`,
              );

              game.fateCoinSystem.totalFlips = 8;
              game.updateUI();
              const goalRoute = doc.getElementById("fate-next-goal-route");
              assert(goalRoute?.tagName === "BUTTON", "下一目标入口不是可操作按钮");
              assert(!goalRoute.disabled, "领地目标入口不可操作");
              assert(goalRoute.dataset.scene === "territory", "下一目标入口没有绑定领地场景");
              assert(goalRoute.textContent.includes("前往领地"), "下一目标入口文案不明确");

              const canvas = doc.getElementById("territoryCanvas");
              assert(canvas instanceof frame.contentWindow.HTMLCanvasElement, "未找到领地 Canvas");
              assert(canvas.width > 0 && canvas.height > 0, "领地 Canvas 尚未完成适配");
              await waitFor(
                () => game.territorySceneController.world.getNearbySite()?.type === "main_base",
                "角色抵达主基地遗迹",
              );
              const nearbyPrompt = doc.getElementById("territory-nearby-prompt");
              assert(nearbyPrompt && !nearbyPrompt.hidden, "主基地附近没有显示交互提示");
              const canvasRect = canvas.getBoundingClientRect();
              const promptRect = nearbyPrompt.getBoundingClientRect();
              const eventRect = doc
                .getElementById("territory-event-feed")
                .getBoundingClientRect();
              assert(
                promptRect.top < canvasRect.top + canvasRect.height * 0.25,
                "交互提示未固定在场景顶部安全区",
              );
              assert(
                promptRect.bottom + 20 < eventRect.top,
                "交互提示与底部建筑铭牌/操作说明区域过近",
              );
              const interact = doc.getElementById("territory-interact-btn");
              assert(interact && !interact.disabled, "主基地遗迹附近没有可用交互");
              interact.click();

              const panel = await waitFor(() => {
                const candidate = doc.getElementById("territory-context-panel");
                return candidate && !candidate.hidden ? candidate : null;
              }, "基地操作面板打开");
              const buildButton = panel.querySelector('[data-territory-action="build"]');
              assert(buildButton && !buildButton.hidden, "基地操作面板未显示修复动作");
              assert(!buildButton.disabled, "免费主基地不可修复");
              buildButton.click();

              const building = await waitFor(
                () =>
                  territory.buildings.length === 1
                    ? territory.buildings[0]
                    : null,
                "主基地建造结算",
              );
              await waitFor(
                () =>
                  territory.rank === 1 &&
                  doc.getElementById("territory-rank-badge")?.textContent?.startsWith("R1"),
                "主基地世界状态与 HUD 渲染",
              );
              await waitFor(
                () => {
                  const image = game.territorySceneController.buildingImages.main_base;
                  return image?.complete && image.naturalWidth > 0;
                },
                "主基地图片资产加载",
              );
              assert(building.type === "main_base", `建筑类型异常：${building.type}`);
              assert(building.slotIndex === 0, `建筑地块异常：${building.slotIndex}`);
              savedBuilding = {
                count: territory.buildings.length,
                type: building.type,
                slotIndex: building.slotIndex,
              };
              return `${building.type} · slot=${building.slotIndex} · rank=${territory.rank} · world=${game.territorySceneController.world.width}`;
            });

            await step("基地设施面板显示宠物岗位实际效果", async () => {
              const game = frame.contentWindow.game;
              const doc = frame.contentDocument;
              const territory = game.territorySystem;
              assert(territory.debugBuildBuilding("training_ground"), "测试训练场创建失败");
              game.territorySceneController.syncProgress();
              game.territorySceneController.updateDisplay();
              game.territorySceneController.selectedSiteType = "training_ground";
              game.territorySceneController.renderContextPanel("training_ground");

              const panel = doc.getElementById("territory-context-panel");
              const panelText = panel?.textContent || "";
              assert(panel && !panel.hidden, "训练场设施面板未显示");
              assert(panelText.includes("火焰犬 · 训练陪练 / 熟悉"), "基地面板未显示岗位档位");
              assert(panelText.includes("攻击战备 +1"), "基地面板未显示岗位整数奖励");
              savedBuilding.count = territory.buildings.length;
              game.territorySceneController.closeContextPanel();
              return "火焰犬 · 训练陪练 / 熟悉 · 攻击战备 +1";
            });

            await step("远征结算显示实际羁绊增长与满值反馈", async () => {
              const game = frame.contentWindow.game;
              const doc = frame.contentDocument;
              const settlement = {
                runId: "browser-bond-preview",
                extracted: true,
                depth: 4,
                kills: 3,
                coins: 120,
                crystals: 4,
                exp: 60,
                petBond: {
                  pets: [
                    { petName: "火焰犬", gain: 0, friendship: 100 },
                    { petName: "冰霜猫", gain: 2, friendship: 42 },
                  ],
                },
              };
              const activeSaveSystem = game.battleSceneController.saveSystem;
              game.battleSceneController.saveSystem = null;
              game.battleSceneController.handleSettlement({ settlement });
              game.battleSceneController.saveSystem = activeSaveSystem;
              const toast = await waitFor(() => {
                return Array.from(doc.querySelectorAll("#toast-container .toast")).find(
                  (candidate) => candidate.textContent?.includes("火焰犬羁绊已满"),
                ) || null;
              }, "满羁绊结算提示");
              assert(toast.textContent.includes("冰霜猫羁绊 +2"), "结算未显示实际羁绊增长");
              const tip = game.battleSceneController.getTip({ settlement });
              assert(tip.includes("火焰犬羁绊已满"), "结算说明未显示满值反馈");
              assert(tip.includes("冰霜猫羁绊 +2"), "结算说明未显示实际增长");
              return "火焰犬羁绊已满 · 冰霜猫羁绊 +2";
            });

            await step("通过 F5 快捷键保存槽位 1", async () => {
              const gameWindow = frame.contentWindow;
              const beforeTimestamp = parseSlotOneSave()?.timestamp || 0;
              const event = new gameWindow.KeyboardEvent("keydown", {
                key: "F5",
                code: "F5",
                bubbles: true,
                cancelable: true,
              });
              gameWindow.document.dispatchEvent(event);

              const save = await waitFor(() => {
                const candidate = parseSlotOneSave();
                return candidate?.timestamp > beforeTimestamp ? candidate : null;
              }, "F5 存档写入");

              assert(event.defaultPrevented, "F5 未被游戏快捷键处理");
              assert(save.version && save.data?.fate, "槽位 1 缺少有效命运数据");
              savedFate = { ...save.data.fate };
              assert(savedFate.fateCoins >= 2, "存档未包含购买后的桌面硬币");
              assert(savedFate.assistants >= 1, "存档未包含招募后的助手");
              assert(savedFate.totalFlips >= 1, "存档未包含手动翻转进度");
              assert(savedBuilding, "保存前未完成主基地建造");
              assert(
                save.data.territory?.buildings?.length === savedBuilding.count,
                "存档未包含建造后的主基地",
              );
              assert(
                save.data.territory.buildings[0]?.type === savedBuilding.type,
                "存档中的建筑类型不一致",
              );
              return `fateCoins=${savedFate.fateCoins} · assistants=${savedFate.assistants} · totalFlips=${savedFate.totalFlips} · buildings=${savedBuilding.count}`;
            });

            await step("重载 iframe 并恢复进度与场景", async () => {
              const previousDocument = frame.contentDocument;
              frame.contentWindow.location.reload();

              const game = await waitFor(
                () =>
                  frame.contentDocument !== previousDocument &&
                  frame.contentWindow?.game?.isInitialized &&
                  frame.contentWindow.game,
                "iframe 重载与游戏重新初始化",
              );
              const restored = game.fateCoinSystem.getSaveData();
              const restoredBuildings = game.territorySystem.buildings;
              const currentUrl = new URL(frame.contentWindow.location.href);

              assert(
                restored.fateCoins === savedFate.fateCoins,
                `桌面硬币恢复不一致：${restored.fateCoins} !== ${savedFate.fateCoins}`,
              );
              assert(
                restored.assistants === savedFate.assistants,
                `助手恢复不一致：${restored.assistants} !== ${savedFate.assistants}`,
              );
              assert(
                restored.totalFlips >= savedFate.totalFlips,
                `翻转进度倒退：${restored.totalFlips} < ${savedFate.totalFlips}`,
              );
              assert(game.currentScene === savedScene, "重载后未恢复领地场景");
              assert(
                currentUrl.searchParams.get("scene") === savedScene,
                "重载后 URL 未保留领地场景",
              );
              assert(
                frame.contentDocument
                  .querySelector('.nav-btn[data-tab="territory"]')
                  ?.classList.contains("active"),
                "重载后领地导航未激活",
              );
              assert(savedBuilding, "重载前未记录主基地状态");
              assert(
                restoredBuildings.length === savedBuilding.count,
                `建筑恢复不一致：${restoredBuildings.length} !== ${savedBuilding.count}`,
              );
              assert(
                restoredBuildings[0]?.type === savedBuilding.type &&
                  restoredBuildings[0]?.slotIndex === savedBuilding.slotIndex,
                "重载后主基地类型或地块不一致",
              );
              assert(game.territorySystem.rank === 1, "重载后领地等级未恢复");
              assert(
                frame.contentDocument.getElementById("territory-rank-badge")?.textContent?.startsWith("R1"),
                "重载后主基地状态未同步到实际基地 HUD",
              );
              assert(
                frame.contentDocument.getElementById("territoryCanvas") instanceof frame.contentWindow.HTMLCanvasElement,
                "重载后实际基地 Canvas 未恢复",
              );
              return `硬币 ${restored.fateCoins} · 助手 ${restored.assistants} · 翻转 ${restored.totalFlips} · 建筑 ${restoredBuildings.length} · scene=${game.currentScene}`;
            });

            await step("领地画布脱离 DOM 后控制器仍可安全重绑", () => {
              const game = frame.contentWindow.game;
              const controller = game.territorySceneController;
              const canvas = frame.contentDocument.getElementById("territoryCanvas");
              assert(controller && canvas, "缺少领地控制器或画布");
              controller.destroy();
              canvas.remove();
              controller.bind();
              controller.destroy();
              assert(controller.resizeObserver === null, "销毁后仍残留 ResizeObserver");
              return "detached canvas bind/destroy ok";
            });
          } catch (error) {
            result.error = error?.message || String(error);
          } finally {
            try {
              cleanup();
              assert(snapshotReady, "测试开始前未完成 localStorage 快照");
              assert(snapshotMatchesStorage(), "PetPlan localStorage 未完整恢复");
              record(
                "pass",
                "移除 iframe 并恢复原有存档",
                `已恢复 ${storageSnapshot.size} 个 petplan_* 键`,
              );
            } catch (error) {
              result.error ||= error?.message || String(error);
              record("fail", "移除 iframe 并恢复原有存档", result.error);
            }

            result.done = true;
            result.ok = result.counts.failed === 0;
            result.status = result.ok ? "passed" : "failed";
            result.finishedAt = new Date().toISOString();
            statusEl.textContent = result.ok ? "全部通过" : "测试失败";
            statusEl.className = result.status;
            document.title = result.ok
              ? "✓ PetPlan 浏览器冒烟测试"
              : "✕ PetPlan 浏览器冒烟测试";
          }
        }

        run();
      })();
    </script>
  </body>
</html>
