<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>场景路由冒烟测试 - PetPlan</title>
    <style>
      body {
        margin: 0 auto;
        max-width: 880px;
        padding: 32px;
        color: #f5f7ff;
        background: #172235;
        font: 16px/1.6 system-ui, sans-serif;
      }

      a {
        color: #ffe08a;
      }

      .result {
        margin: 12px 0;
        padding: 12px 16px;
        border-radius: 8px;
        background: #24344f;
      }

      .pass {
        border-left: 5px solid #55d68b;
      }

      .fail {
        border-left: 5px solid #ff6b7d;
      }

      #router-fixture {
        position: fixed;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip-path: inset(50%);
      }
    </style>
  </head>
  <body>
    <h1>PetPlan 场景路由冒烟测试</h1>
    <p>本页只验证场景与旧入口，不读写游戏存档。</p>
    <p>
      <a href="../index.html">打开游戏</a>
      ·
      <a href="../territory.html">验证旧领地入口</a>
    </p>
    <div id="results" aria-live="polite"></div>

    <div id="router-fixture" aria-hidden="true">
      <button data-test-nav data-tab="fate">命运</button>
      <button data-test-nav data-tab="dungeon">战斗</button>
      <button data-test-nav data-tab="territory">领地</button>
      <section id="test-fate"></section>
      <section id="test-dungeon"></section>
      <section id="test-territory"></section>
    </div>

    <script type="module">
      import { SceneRouter } from "../js/modules/scene-router.js?v=phase-one-20260710b";

      const results = document.getElementById("results");
      const report = (name, passed, detail = "") => {
        const item = document.createElement("div");
        item.className = `result ${passed ? "pass" : "fail"}`;
        item.textContent = `${passed ? "通过" : "失败"}：${name}${detail ? ` — ${detail}` : ""}`;
        results.appendChild(item);
      };

      const router = new SceneRouter({
        navSelector: "[data-test-nav]",
        scenes: {
          fate: "#test-fate",
          dungeon: "#test-dungeon",
          territory: "#test-territory",
        },
      });

      for (const scene of ["fate", "dungeon", "territory"]) {
        const active = router.activate(scene);
        const visible = Object.entries(router.scenes)
          .filter(([, selector]) => document.querySelector(selector).style.display === "flex")
          .map(([name]) => name);
        report(`${scene} 场景映射`, active === scene && visible.join() === scene);
      }

      const originalLocation = `${location.pathname}${location.search}${location.hash}`;
      history.replaceState({}, "", `${location.pathname}?scene=invalid#route-test`);
      const normalized = router.getRequestedScene("fate", { normalize: true });
      report(
        "无效 scene 规范化",
        normalized === "fate" && !new URL(location.href).searchParams.has("scene")
      );
      history.replaceState({}, "", originalLocation);

      try {
        const response = await fetch("../territory.html", { cache: "no-store" });
        const source = await response.text();
        report(
          "territory.html 兼容跳转",
          response.ok && source.includes("index.html?scene=territory")
        );
      } catch (error) {
        report("territory.html 兼容跳转", false, error.message);
      }
    </script>
  </body>
</html>
